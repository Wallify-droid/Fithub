<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuthKey — TOTP Authenticator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* Kill ALL browser focus blue rings globally */
  *, *:focus, *:focus-visible, *:focus-within {
    outline: none !important;
    box-shadow: none !important;
    -webkit-tap-highlight-color: transparent !important;
  }
  input, button, a { -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #080808;
    --surface: #111;
    --surface2: #181818;
    --surface3: #202020;
    --border: #1e1e1e;
    --border2: #2a2a2a;
    --border3: #363636;
    --text: #ececec;
    --text2: #777;
    --text3: #444;
    --accent: #fff;
    --danger: #e74c3c;
    --warn: #e67e22;
    --ok: #2ecc71;
  }

  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── HEADER ── */
  header {
    width: 100%;
    max-width: 520px;
    padding: 28px 24px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo-block { display: flex; flex-direction: column; gap: 2px; }
  .logo { font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
  .logo-sub { font-size: 11px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; }

  .add-btn {
    background: var(--text);
    color: var(--bg);
    border: none;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 9px 16px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: background 0.15s, transform 0.1s;
  }
  .add-btn:hover { background: #ddd; }
  .add-btn:active { transform: scale(0.97); }

  /* ── MAIN ── */
  main { width: 100%; max-width: 520px; padding: 24px 24px 60px; }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat-pill {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700; color: var(--text); }
  .stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }

  /* Global timer ring */
  .timer-pill { align-items: center; justify-content: center; }
  .ring-wrap { position: relative; width: 48px; height: 48px; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--border2); stroke-width: 3; }
  .ring-fg { fill: none; stroke: var(--text2); stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 1s linear, stroke 0.5s; }
  .ring-fg.warn { stroke: var(--warn); }
  .ring-fg.danger { stroke: var(--danger); }
  .ring-text {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 700;
    color: var(--text);
  }

  /* ── ADD PANEL ── */
  .add-panel {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px;
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), margin-bottom 0.35s, border-color 0.2s;
    margin-bottom: 0;
  }
  .add-panel.open { max-height: 400px; margin-bottom: 20px; border-color: var(--border3); }

  .panel-inner { padding: 22px; }
  .panel-title {
    font-size: 11px; font-weight: 600; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 18px;
  }

  .fields { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }

  .field-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; }
  .field-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 11px 14px;
    border-radius: 8px;
    transition: border-color 0.15s;
    outline: none !important;
  }
  .field-input:focus { border-color: var(--border3); }
  .field-input::placeholder { color: var(--text3); }
  .field-input.mono { font-family: 'JetBrains Mono', monospace; font-size: 12px; }

  .panel-actions { display: flex; gap: 8px; }
  .pnl-btn {
    flex: 1; padding: 11px; border-radius: 8px;
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; border: none; transition: all 0.15s;
    outline: none !important;
  }
  .pnl-btn:active { transform: scale(0.97); }
  .pnl-btn.primary { background: var(--text); color: var(--bg); }
  .pnl-btn.primary:hover { background: #d8d8d8; }
  .pnl-btn.ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border2); }
  .pnl-btn.ghost:hover { color: var(--text); }

  /* ── SECTION LABEL ── */
  .section-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .section-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; }

  /* ── ACCOUNT CARDS ── */
  .accounts-list { display: flex; flex-direction: column; gap: 8px; }

  .account-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 0;
    overflow: hidden;
    transition: border-color 0.2s;
    position: relative;
  }
  .account-card:hover { border-color: var(--border2); }

  .card-body { display: flex; align-items: center; gap: 14px; padding: 18px 18px 14px; }

  /* Icon */
  .card-icon {
    width: 40px; height: 40px; border-radius: 10px;
    background: var(--surface3);
    border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 700;
    color: var(--text2); flex-shrink: 0;
  }

  /* Info */
  .card-info { flex: 1; min-width: 0; }
  .card-issuer { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 3px; }
  .card-name { font-size: 13px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Code */
  .card-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .card-code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px; font-weight: 700;
    color: var(--text);
    letter-spacing: 0.08em;
    cursor: pointer;
    user-select: none;
    transition: color 0.15s;
    position: relative;
  }
  .card-code::after {
    content: 'Copy';
    position: absolute;
    bottom: -16px; left: 50%;
    transform: translateX(-50%);
    font-size: 9px; font-family: 'Inter', sans-serif;
    color: var(--text3); letter-spacing: 0.06em;
    text-transform: uppercase;
    opacity: 0; transition: opacity 0.15s;
  }
  .account-card:hover .card-code::after { opacity: 1; }
  .card-code.ok { color: var(--ok) !important; }
  .card-code.warn-text { color: var(--warn); }
  .card-code.danger-text { color: var(--danger); }

  .card-del {
    background: none; border: none;
    color: var(--text3); font-size: 15px;
    cursor: pointer; padding: 4px 6px;
    border-radius: 6px; line-height: 1;
    transition: color 0.15s, background 0.15s;
    opacity: 0; outline: none !important;
    flex-shrink: 0;
  }
  .account-card:hover .card-del { opacity: 1; }
  .card-del:hover { color: var(--danger); background: rgba(231,76,60,0.08); }

  /* Progress bar */
  .card-bar { height: 2px; background: var(--border); width: 100%; }
  .card-bar-fill {
    height: 100%;
    background: var(--border3);
    transition: width 1s linear, background 0.5s;
  }
  .card-bar-fill.warn { background: var(--warn); }
  .card-bar-fill.danger { background: var(--danger); }

  /* ── EMPTY STATE ── */
  .empty {
    margin-top: 20px;
    background: var(--surface);
    border: 1px dashed var(--border2);
    border-radius: 16px;
    padding: 48px 32px;
    text-align: center;
  }
  .empty-icon { font-size: 36px; margin-bottom: 16px; filter: grayscale(1); opacity: 0.3; }
  .empty-title { font-size: 15px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }
  .empty-desc { font-size: 12px; color: var(--text3); line-height: 1.7; }
  .empty-steps {
    margin-top: 20px;
    text-align: left;
    display: inline-block;
  }
  .empty-step {
    display: flex; gap: 10px; align-items: flex-start;
    font-size: 11px; color: var(--text3); margin-bottom: 8px; line-height: 1.5;
  }
  .step-num {
    flex-shrink: 0; width: 18px; height: 18px;
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 600; color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: var(--surface);
    border: 1px solid var(--border3);
    color: var(--text);
    font-size: 12px; font-weight: 500;
    padding: 10px 20px; border-radius: 100px;
    opacity: 0; transition: all 0.22s cubic-bezier(0.4,0,0.2,1);
    pointer-events: none; white-space: nowrap; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo-block">
    <div class="logo">AuthKey</div>
    <div class="logo-sub">TOTP Authenticator</div>
  </div>
  <button class="add-btn" onclick="togglePanel()">+ Add Account</button>
</header>

<main>
  <!-- Stats Bar -->
  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat-pill">
      <div class="stat-value" id="statCount">0</div>
      <div class="stat-label">Accounts</div>
    </div>
    <div class="stat-pill timer-pill">
      <div class="ring-wrap">
        <svg width="48" height="48" viewBox="0 0 48 48">
          <circle class="ring-bg" cx="24" cy="24" r="20"/>
          <circle class="ring-fg" id="ringFg" cx="24" cy="24" r="20"
            stroke-dasharray="125.66"
            stroke-dashoffset="0"/>
        </svg>
        <div class="ring-text" id="ringText">30</div>
      </div>
    </div>
  </div>

  <!-- Add Panel -->
  <div class="add-panel" id="addPanel">
    <div class="panel-inner">
      <div class="panel-title">Add new account</div>
      <div class="fields">
        <div>
          <div class="field-label">Account / Email</div>
          <input class="field-input" id="inpName" type="text" placeholder="momin@github.com" />
        </div>
        <div>
          <div class="field-label">Service (optional)</div>
          <input class="field-input" id="inpIssuer" type="text" placeholder="GitHub, Google, Discord…" />
        </div>
        <div>
          <div class="field-label">Secret Key</div>
          <input class="field-input mono" id="inpSecret" type="text"
            placeholder="" autocomplete="off" autocorrect="off"
            spellcheck="false" />
          <div style="font-size:10px;color:var(--text3);margin-top:6px;font-family:'JetBrains Mono',monospace;letter-spacing:0.04em;">e.g. II3TQ33HW5KLLOOT</div>
        </div>
      </div>
      <div class="panel-actions">
        <button class="pnl-btn ghost" onclick="togglePanel()">Cancel</button>
        <button class="pnl-btn primary" onclick="addAccount()">Add Account</button>
      </div>
    </div>
  </div>

  <!-- Accounts Container -->
  <div id="container"></div>
</main>

<div class="toast" id="toast"></div>

<script>
// ── TOTP (RFC 6238) ───────────────────────────────────────────────────────────

function b32decode(s) {
  const alpha = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
  const clean = s.replace(/\s/g,'').toUpperCase().replace(/=+$/,'');
  let bits = 0, val = 0; const out = [];
  for (const ch of clean) {
    const i = alpha.indexOf(ch); if (i < 0) continue;
    val = (val << 5) | i; bits += 5;
    if (bits >= 8) { out.push((val >>> (bits-8)) & 0xff); bits -= 8; }
  }
  return new Uint8Array(out);
}

async function totp(secret) {
  const key = b32decode(secret);
  const t = Math.floor(Date.now()/1000/30);
  const buf = new ArrayBuffer(8);
  const view = new DataView(buf);
  view.setUint32(4, t, false);
  const k = await crypto.subtle.importKey('raw', key, {name:'HMAC',hash:'SHA-1'}, false, ['sign']);
  const sig = new Uint8Array(await crypto.subtle.sign('HMAC', k, buf));
  const off = sig[19] & 0xf;
  const code = ((sig[off]&0x7f)<<24)|((sig[off+1]&0xff)<<16)|((sig[off+2]&0xff)<<8)|(sig[off+3]&0xff);
  return String(code % 1000000).padStart(6,'0');
}

function secsLeft() { return 30 - (Math.floor(Date.now()/1000) % 30); }

// ── Storage ──────────────────────────────────────────────────────────────────

let accounts = [];
try { accounts = JSON.parse(localStorage.getItem('authkey_v2') || '[]'); } catch {}
function save() { localStorage.setItem('authkey_v2', JSON.stringify(accounts)); }

// ── Panel ────────────────────────────────────────────────────────────────────

let panelOpen = false;
function togglePanel() {
  panelOpen = !panelOpen;
  document.getElementById('addPanel').classList.toggle('open', panelOpen);
  if (panelOpen) setTimeout(() => document.getElementById('inpName').focus(), 50);
}

function addAccount() {
  const name   = document.getElementById('inpName').value.trim();
  const issuer = document.getElementById('inpIssuer').value.trim();
  const secret = document.getElementById('inpSecret').value.trim().replace(/\s/g,'');
  if (!name)   return toast('Enter account name');
  if (!secret) return toast('Enter secret key');
  if (!/^[A-Z2-7]+=*$/i.test(secret)) return toast('Invalid secret — check your key');
  accounts.push({ id: Date.now(), name, issuer, secret });
  save(); render();
  document.getElementById('inpName').value = '';
  document.getElementById('inpIssuer').value = '';
  document.getElementById('inpSecret').value = '';
  panelOpen = false;
  document.getElementById('addPanel').classList.remove('open');
  toast('Account added ✓');
}

function deleteAccount(id) {
  accounts = accounts.filter(a => a.id !== id);
  save(); render();
  toast('Removed');
}

// ── Copy ─────────────────────────────────────────────────────────────────────

function copyCode(id) {
  const el = document.getElementById('code-'+id);
  if (!el) return;
  const raw = el.dataset.raw;
  if (!raw || raw === '------') return;

  const doCopy = () => {
    el.textContent = 'Copied!';
    el.classList.add('ok');
    toast('Copied to clipboard ✓');
    setTimeout(() => {
      el.classList.remove('ok');
      updateCard(accounts.find(a=>a.id==id));
    }, 1500);
  };

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(raw).then(doCopy).catch(() => fallbackCopy(raw, doCopy));
  } else {
    fallbackCopy(raw, doCopy);
  }
}

function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); cb(); }
  catch { toast('Copy failed — long press the code'); }
  document.body.removeChild(ta);
}

// ── Render ───────────────────────────────────────────────────────────────────

function initials(name) {
  const p = name.split(/[@.\s_]/);
  return (p[0]||'').slice(0,2).toUpperCase() || '??';
}

function render() {
  const c = document.getElementById('container');
  const stats = document.getElementById('statsBar');

  if (accounts.length === 0) {
    stats.style.display = 'none';
    c.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🔐</div>
        <div class="empty-title">No accounts yet</div>
        <div class="empty-desc">Add any account that uses Google Authenticator–style 2FA.</div>
        <div class="empty-steps">
          <div class="empty-step"><div class="step-num">1</div><span>Go to a site's 2FA settings (e.g. GitHub → Security)</span></div>
          <div class="empty-step"><div class="step-num">2</div><span>Choose "setup key" instead of scanning the QR code</span></div>
          <div class="empty-step"><div class="step-num">3</div><span>Paste that secret key here and tap Add Account</span></div>
        </div>
      </div>`;
    return;
  }

  stats.style.display = 'flex';
  document.getElementById('statCount').textContent = accounts.length;

  c.innerHTML = `
    <div class="section-head">
      <div class="section-label">${accounts.length} account${accounts.length!==1?'s':''}</div>
    </div>
    <div class="accounts-list" id="list"></div>`;

  const list = document.getElementById('list');
  accounts.forEach(acc => {
    const card = document.createElement('div');
    card.className = 'account-card';
    card.id = 'card-'+acc.id;
    card.innerHTML = `
      <div class="card-body">
        <div class="card-icon">${initials(acc.name)}</div>
        <div class="card-info">
          <div class="card-issuer">${acc.issuer || 'TOTP'}</div>
          <div class="card-name">${acc.name}</div>
        </div>
        <div class="card-right">
          <div class="card-code" id="code-${acc.id}" data-raw="" onclick="copyCode(${acc.id})">------</div>
          <button class="card-del" onclick="deleteAccount(${acc.id})" title="Remove">✕</button>
        </div>
      </div>
      <div class="card-bar"><div class="card-bar-fill" id="bar-${acc.id}"></div></div>`;
    list.appendChild(card);
  });

  tick();
}

// ── Tick ─────────────────────────────────────────────────────────────────────

async function updateCard(acc) {
  if (!acc) return;
  const codeEl = document.getElementById('code-'+acc.id);
  const barEl  = document.getElementById('bar-'+acc.id);
  if (!codeEl) return;
  if (codeEl.classList.contains('ok')) return; // currently showing "Copied!"

  try {
    const code = await totp(acc.secret);
    const formatted = code.slice(0,3) + ' ' + code.slice(3);
    codeEl.textContent = formatted;
    codeEl.dataset.raw = code;

    const secs = secsLeft();
    const isDanger = secs <= 5;
    const isWarn   = secs <= 10;
    codeEl.className = 'card-code' + (isDanger?' danger-text': isWarn?' warn-text':'');
    if (barEl) {
      barEl.style.width = (secs/30*100)+'%';
      barEl.className = 'card-bar-fill' + (isDanger?' danger': isWarn?' warn':'');
    }
  } catch {
    codeEl.textContent = 'ERR';
    codeEl.dataset.raw = '';
  }
}

function updateRing() {
  const secs = secsLeft();
  const circ = 125.66;
  const offset = circ * (1 - secs/30);
  const fg = document.getElementById('ringFg');
  const txt = document.getElementById('ringText');
  if (!fg || !txt) return;
  fg.style.strokeDashoffset = offset;
  fg.className = 'ring-fg' + (secs<=5?' danger': secs<=10?' warn':'');
  txt.textContent = secs;
}

async function tick() {
  updateRing();
  await Promise.all(accounts.map(updateCard));
}

render();
setInterval(tick, 1000);

// ── Keys ────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && panelOpen) addAccount();
  if (e.key === 'Escape' && panelOpen) togglePanel();
});

// ── Toast ────────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}
</script>
</body>
</html>
